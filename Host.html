<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Host Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    input,
    button,
    textarea {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      font-weight: bold;
    }

    table,
    th,
    td {
      border: 1px solid #aaa;
      border-collapse: collapse;
      padding: 8px;
      margin: 10px auto;
    }

    table {
      width: 90%;
      background: #fff;
    }

    th {
      background: #f0f0f0;
    }

    /* FIX: Cập nhật CSS cho danh sách bấm chuông */
    ol {
      text-align: center; /* Căn giữa nội dung list item */
      width: 550px; /* Tăng chiều dài khung theo yêu cầu */
      margin: 10px auto;
      background: #fff;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 6px;
      font-weight: bold; /* In đậm toàn bộ chữ */
      word-wrap: break-word; /* Đảm bảo chữ không bị tràn */
      overflow-wrap: break-word; 
      list-style-position: inside; /* Đưa số thứ tự vào trong khung để căn giữa */
    }

    #roomInfo {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 15px;
      color: #333;
    }

    /* ======= Nút điều khiển ======= */
    button {
      cursor: pointer;
      border-radius: 6px;
      border: none;
      font-weight: bold;
      transition: all 0.25s ease;
    }

    #btnCreate {
      background: purple;
      color: white;
    }

    /* Nút giới hạn (xanh dương) */
    #unlockAnswersLimited,
    #unlockBuzzLimited {
      background: purple;
      color: white;
      font-weight: bold;
    }

    /* Nút vĩnh viễn (xanh đậm) */
    #unlockAnswersPermanent,
    #unlockBuzzPermanent {
      background: blue;
      color: white;
      font-weight: bold;
    }

    #lockAnswers,
    #lockBuzz {
      background: green;
      color: white;
      font-weight: bold;
    }

    #resetAnswers,
    #resetBuzz {
      background: yellow;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #ff00cc !important;
      color: white !important;
    }

    /* ======= Trạng thái hiển thị ======= */
    .status-box {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 6px;
      margin: 5px;
      min-width: 160px;
      font-weight: bold;
      font-size: 17px;
    }

    .open {
      background: green;
      color: white;
      box-shadow: 0 0 10px green;
    }

    .locked {
      background: red;
      color: white;
    }

    /* ======= Popup thông báo ======= */
    #popupMessage {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: blue;
      color: white;
      padding: 15px 30px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s, top 0.5s;
      font-weight: bold;
    }

    .error {
      background-color: red;
      color: white;
      font-weight: bold;
    }

    /* FIX: CSS mới cho ô nhập thời gian trên 1 đường ngang */
    .control-group {
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .control-item {
      display: flex;
      align-items: center;
    }

    .control-item label {
      font-weight: bold;
      margin-right: 10px;
    }
  </style>
</head>

<body>
  <h1>Host Panel</h1>

  <div id="roomInfo"></div>
  <button id="btnCreate">Tạo phòng</button><br><br>

  <div>
    <div class="status-box locked" id="statusAnswer">Đáp án: 🔒 Đang khóa</div>
    <div class="status-box locked" id="statusBuzz">Chuông: 🚫 Đang khóa</div>
  </div><br>

  <div class="control-group">
    <div class="control-item">
      <label for="answerDuration">Thời gian mở đáp án (giây):</label>
      <input type="number" id="answerDuration" value="15" min="1" max="300" style="width: 80px; font-weight: bold;">
    </div>
    <div class="control-item">
      <label for="buzzDuration">Thời gian mở chuông (giây):</label>
      <input type="number" id="buzzDuration" value="5" min="1" max="300" style="width: 80px; font-weight: bold;">
    </div>
  </div>

  <button id="unlockAnswersLimited">Mở đáp án (Giới hạn)</button>
  <button id="unlockAnswersPermanent">Mở đáp án (Vĩnh viễn)</button>
  <button id="lockAnswers">Khóa đáp án</button>
  <button id="resetAnswers">Reset đáp án</button>

  <br>

  <button id="unlockBuzzLimited">Mở chuông (Giới hạn)</button>
  <button id="unlockBuzzPermanent">Mở chuông (Vĩnh viễn)</button>
  <button id="lockBuzz">Khóa chuông</button>
  <button id="resetBuzz">Reset chuông</button>

  <h2>Đáp án (lần gửi gần nhất):</h2>
  <table id="tblAnswers">
    <tr>
      <th>Tên</th>
      <th>Đáp án</th>
      <th>Thời gian</th>
    </tr>
  </table>

  <h2>Thứ tự bấm chuông:</h2>
  <ol id="buzzList"></ol>

  <div id="popupMessage"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-analytics.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAKTVuijDV4QfHjDcnEau2w9MaRL9YduEQ",
      authDomain: "buzz-game-7c91c.firebaseapp.com",
      projectId: "buzz-game-7c91c",
      storageBucket: "buzz-game-7c91c.firebasestorage.app",
      messagingSenderId: "946217092381",
      appId: "1:946217092381:web:d81064145965fb151acdf4",
      measurementId: "G-C7KG9KSJ9C"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    // Khởi tạo Database sử dụng Modular API
    const db = getDatabase(app);
    let roomRef; 
    let currentRoomCode = null;
    let answerTimeout = null;
    let buzzTimeout = null; 
    
    // Biến lưu thời điểm Host mở khóa để tính Elapsed Time
    let answerStartTime = 0;
    let buzzStartTime = 0;

    // FIX: Hàm định dạng thời gian 3 chữ số thập phân
    function formatTime(timestamp, startTime) {
      if (typeof timestamp !== 'number' || isNaN(timestamp) || startTime === 0) return '';
      
      // Tính thời gian trôi qua (Elapsed Time) và giữ 3 chữ số thập phân
      const elapsedTime = Math.max(0, timestamp - startTime);
      const totalSeconds = elapsedTime / 1000;
      // FIX: Đổi toFixed(4) thành toFixed(3)
      return totalSeconds.toFixed(3) + 's';
    }

    // ====== Popup hiển thị ======
    function showPopup(message, type = 'success') {
      const popup = document.getElementById('popupMessage');
      popup.innerText = message;
      if (type === 'error') popup.classList.add('error');
      else popup.classList.remove('error');

      popup.style.transition = 'none';
      popup.style.opacity = '0';
      popup.style.top = '20px';
      void popup.offsetHeight;

      popup.style.transition = 'opacity 0.5s, top 0.5s';
      popup.style.opacity = '1';
      popup.style.top = '40px';
      setTimeout(() => {
        popup.style.opacity = '0';
        popup.style.top = '20px';
      }, 3000);
    }

    function generateRoomCode() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // #region Các hàm điều khiển Đáp án

    function lockAnswers() {
      if (!roomRef) return;
      if (answerTimeout) {
        clearTimeout(answerTimeout);
        answerTimeout = null;
      }
      answerStartTime = 0; // Reset thời điểm bắt đầu khi khóa
      set(ref(roomRef, 'lockedAnswer'), true).then(() => {
        showPopup("Đã khóa đáp án.");
      }).catch(e => showPopup("Lỗi khóa đáp án. Kiểm tra Rules Firebase.", "error"));
    }

    function unlockAnswersLimited() {
      if (!roomRef) {
        showPopup("Vui lòng tạo phòng trước.", "error");
        return;
      }
      // Set duration trước để Contestant kịp đọc
      const durationSeconds = parseInt(document.getElementById('answerDuration').value);
      set(ref(roomRef, 'answerDuration'), durationSeconds).then(() => {
          if (answerTimeout) {
            clearTimeout(answerTimeout);
            answerTimeout = null;
          }

          if (isNaN(durationSeconds) || durationSeconds <= 0) {
            showPopup("Thời gian mở phải là số nguyên dương lớn hơn 0.", 'error');
            return;
          }
          
          answerStartTime = Date.now(); // Ghi lại thời điểm mở khóa
          set(ref(roomRef, 'lockedAnswer'), false).then(() => {
            showPopup(`Đã mở đáp án trong ${durationSeconds} giây!`);
          }).catch(error => {
            console.error("Lỗi khi mở đáp án:", error);
            showPopup("Lỗi khi mở đáp án. Kiểm tra Rules Firebase.", "error");
            return;
          });

          answerTimeout = setTimeout(() => {
            if (!roomRef) return; 
            set(ref(roomRef, 'lockedAnswer'), true).then(() => {
              showPopup("Hết giờ. Đáp án đã tự động khóa.");
            }).catch(e => showPopup("Lỗi tự động khóa. Kiểm tra Rules Firebase.", "error"));
            answerTimeout = null; 
          }, durationSeconds * 1000); 
      });
    }

    function unlockAnswersPermanent() {
      if (!roomRef) {
        showPopup("Vui lòng tạo phòng trước.", "error");
        return;
      }
      if (answerTimeout) {
        clearTimeout(answerTimeout);
        answerTimeout = null;
      }
      // Reset duration
      set(ref(roomRef, 'answerDuration'), null);
      
      answerStartTime = Date.now(); // Ghi lại thời điểm mở khóa (vĩnh viễn)
      set(ref(roomRef, 'lockedAnswer'), false).then(() => {
        showPopup("Đã mở đáp án (Vĩnh viễn).");
      }).catch(e => showPopup("Lỗi mở đáp án. Kiểm tra Rules Firebase.", "error"));
    }
    
    // #endregion

    // #region Các hàm điều khiển Chuông
    
    function lockBuzz() {
      if (!roomRef) return;
      if (buzzTimeout) {
        clearTimeout(buzzTimeout);
        buzzTimeout = null;
      }
      buzzStartTime = 0; // Reset thời điểm bắt đầu khi khóa
      set(ref(roomRef, 'lockedBuzz'), true).then(() => {
        showPopup("Đã khóa chuông.");
      }).catch(e => showPopup("Lỗi khóa chuông. Kiểm tra Rules Firebase.", "error"));
    }

    function unlockBuzzPermanent() {
      if (!roomRef) {
        showPopup("Vui lòng tạo phòng trước.", "error");
        return;
      }
      if (buzzTimeout) {
        clearTimeout(buzzTimeout);
        buzzTimeout = null;
      }
      // Reset duration
      set(ref(roomRef, 'buzzDuration'), null);

      buzzStartTime = Date.now(); // Ghi lại thời điểm mở khóa (vĩnh viễn)
      set(ref(roomRef, 'lockedBuzz'), false).then(() => {
        showPopup("Đã mở chuông (Vĩnh viễn)!");
      }).catch(e => showPopup("Lỗi mở chuông. Kiểm tra Rules Firebase.", "error"));
    }

    function unlockBuzzLimited() {
      if (!roomRef) {
        showPopup("Vui lòng tạo phòng trước.", "error");
        return;
      }
      // Set duration trước để Contestant kịp đọc
      const durationSeconds = parseInt(document.getElementById('buzzDuration').value);
      set(ref(roomRef, 'buzzDuration'), durationSeconds).then(() => {
        if (buzzTimeout) {
          clearTimeout(buzzTimeout);
          buzzTimeout = null;
        }

        if (isNaN(durationSeconds) || durationSeconds <= 0) {
          showPopup("Thời gian mở phải là số nguyên dương lớn hơn 0.", 'error');
          return;
        }

        buzzStartTime = Date.now(); // Ghi lại thời điểm mở khóa
        set(ref(roomRef, 'lockedBuzz'), false).then(() => {
          showPopup(`Đã mở chuông trong ${durationSeconds} giây!`);
        }).catch(error => {
          console.error("Lỗi khi mở chuông:", error);
          showPopup("Lỗi khi mở chuông. Kiểm tra Rules Firebase.", "error");
          return;
        });

        buzzTimeout = setTimeout(() => {
          if (!roomRef) return; 
          set(ref(roomRef, 'lockedBuzz'), true).then(() => {
            showPopup("Hết giờ. Chuông đã tự động khóa.");
          }).catch(e => showPopup("Lỗi tự động khóa chuông. Kiểm tra Rules Firebase.", "error"));
          buzzTimeout = null; 
        }, durationSeconds * 1000); 
      });
    }
    
    // #endregion


    document.getElementById('btnCreate').onclick = () => {
      if (currentRoomCode) {
        showPopup("Phòng đã được tạo. Mã phòng: " + currentRoomCode, "error");
        return;
      }

      const code = generateRoomCode();
      currentRoomCode = code;
      document.getElementById('roomInfo').innerHTML = `🔑 <b>Mã phòng:</b> <span style="color:black;">${code}</span>`;

      roomRef = ref(db, 'rooms/' + code);
      // Sử dụng set() Modular API để tạo phòng
      set(roomRef, {
        answers: {},
        buzzOrder: [],
        lockedAnswer: true,
        lockedBuzz: true,
        answerDuration: null, // Thêm trường duration
        buzzDuration: null // Thêm trường duration
      }).then(() => {
        document.getElementById('btnCreate').disabled = true;
        showPopup("Đã tạo phòng thành công! Mã phòng: " + code);
        // Gán các hàm xử lý nút bấm khác sau khi tạo phòng thành công
        attachListeners();
      }).catch(error => {
        console.error("Lỗi khi tạo phòng:", error);
        showPopup("Lỗi khi tạo phòng. Kiểm tra Rules Firebase.", "error");
        currentRoomCode = null;
      });
    };

    function attachListeners() {
      const statusAnswer = document.getElementById('statusAnswer');
      const statusBuzz = document.getElementById('statusBuzz');

      // Lắng nghe trạng thái 'lockedAnswer'
      onValue(ref(roomRef, 'lockedAnswer'), snap => {
        const val = snap.val();
        const locked = val === true || val === "true";
        if (locked) {
          statusAnswer.className = 'status-box locked';
          statusAnswer.innerText = 'Đáp án: 🔒 Đang khóa';
        } else {
          statusAnswer.className = 'status-box open';
          statusAnswer.innerText = 'Đáp án: 🔓 Đang mở';
        }
      });

      // Lắng nghe trạng thái 'lockedBuzz'
      onValue(ref(roomRef, 'lockedBuzz'), snap => {
        const val = snap.val();
        const locked = val === true || val === "true";
        if (locked) {
          statusBuzz.className = 'status-box locked';
          statusBuzz.innerText = 'Chuông: 🚫 Đang khóa';
        } else {
          statusBuzz.className = 'status-box open';
          statusBuzz.innerText = 'Chuông: 🔔 Đang mở';
        }
      });

      // Lắng nghe dữ liệu 'answers'
      onValue(ref(roomRef, 'answers'), snap => {
        const obj = snap.val() || {};
        const tbl = document.getElementById('tblAnswers');
        tbl.innerHTML = '<tr><th>Tên</th><th>Đáp án</th><th>Thời gian</th></tr>';
        Object.values(obj).sort((a, b) => a.ts - b.ts).forEach(x => {
          const tr = tbl.insertRow();
          tr.insertCell().innerText = x.name;
          tr.insertCell().innerText = x.answer;
          // FIX: Dùng formatTime mới để hiển thị Elapsed Time (3 chữ số)
          tr.insertCell().innerText = formatTime(x.ts, answerStartTime); 
        });
      });

      // Lắng nghe dữ liệu 'buzzOrder'
      onValue(ref(roomRef, 'buzzOrder'), snap => {
        const list = snap.val() || [];
        const ol = document.getElementById('buzzList');
        ol.innerHTML = '';
        Object.values(list).forEach(x => { 
          const li = document.createElement('li');
          // FIX: Dùng formatTime mới để hiển thị Elapsed Time (3 chữ số)
          li.innerText = x.name + ' (' + formatTime(x.ts, buzzStartTime) + ')'; 
          ol.appendChild(li);
        });
      });

      // GÁN CÁC HÀM XỬ LÝ NÚT BẤM SAU KHI TẠO PHÒNG
      
      // Đáp án
      document.getElementById('lockAnswers').onclick = lockAnswers;
      document.getElementById('unlockAnswersLimited').onclick = unlockAnswersLimited; 
      document.getElementById('unlockAnswersPermanent').onclick = unlockAnswersPermanent; 
      document.getElementById('resetAnswers').onclick = () => {
        set(ref(roomRef, 'answers'), {}).catch(e => showPopup("Lỗi reset. Kiểm tra Rules Firebase.", "error"));
        showPopup("Đã reset danh sách đáp án.");
      };

      // Chuông
      document.getElementById('lockBuzz').onclick = lockBuzz; 
      document.getElementById('unlockBuzzPermanent').onclick = unlockBuzzPermanent; 
      document.getElementById('unlockBuzzLimited').onclick = unlockBuzzLimited;
      document.getElementById('resetBuzz').onclick = () => {
        set(ref(roomRef, 'buzzOrder'), []).catch(e => showPopup("Lỗi reset chuông. Kiểm tra Rules Firebase.", "error"));
        showPopup("Đã reset thứ tự chuông.");
      };
    }
  </script>
</body>

</html>
